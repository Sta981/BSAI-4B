<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Superior Insight</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; margin: 0; }
        
        /* REDUCED padding here to make the top bar thinner */
        .header { background-color: #5e2d8a; color: white; padding: 10px 20px; text-align: center; border-bottom: 5px solid #ffcc00; }
        .header h1 { margin: 10px 0 5px 0; font-size: 24px; }
        .header p { margin: 0 0 10px 0; font-size: 14px; }
        
        /* INCREASED height from 60vh to 75vh for more chat space */
        .chat-container { max-width: 800px; margin: 20px auto; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; height: 75vh; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 8px; line-height: 1.5; }
        .user-msg { background-color: #5e2d8a; color: white; align-self: flex-end; border-bottom-right-radius: 0; }
        .ai-msg { background-color: #e8e1f2; color: #333; align-self: flex-start; border-bottom-left-radius: 0; border: 1px solid #dcd0f0; }
        
        /* ADDED styling for the markdown bullet points */
        .ai-msg p { margin: 0 0 10px 0; }
        .ai-msg p:last-child { margin: 0; }
        .ai-msg ul, .ai-msg ol { margin: 10px 0; padding-left: 20px; }
        
        .source-tag { display: block; font-size: 0.85em; color: #555; margin-top: 10px; font-style: italic; background: #ddd; padding: 4px 8px; border-radius: 4px; width: fit-content;}
        .input-area { display: flex; padding: 15px; border-top: 1px solid #eee; background: #fafafa; border-bottom-left-radius: 10px; border-bottom-right-radius: 10px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 5px; outline: none; font-size: 16px; }
        button { background-color: #ffcc00; color: #5e2d8a; border: none; padding: 12px 25px; margin-left: 10px; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background-color: #e6b800; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Superior Insight</h1>
        <p>AI-Powered Academic & Policy Oracle</p>
    </div>

    <div class="chat-container">
        <div class="chat-box" id="chat-box">
            <div class="message ai-msg">Hello! I am Superior Insight. Ask me anything about programs, credit hours, or campus policies!</div>
        </div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="e.g., What are the subjects in BS Robotics 5th semester?..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Ask Syed</button>
        </div>
    </div>
<script>
        // Yeh code Enter key ko 100% accurately catch karega
        document.getElementById("user-input").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                event.preventDefault(); // Yeh page ko refresh hone se rokega
                sendMessage();
            }
        });

        async function sendMessage() {
            const inputField = document.getElementById("user-input");
            const message = inputField.value.trim();
            if (!message) return; // Agar khali enter press kiya toh kuch nahi hoga

            const chatBox = document.getElementById("chat-box");
            
            // User ka message show karo
            chatBox.innerHTML += `<div class="message user-msg">${message}</div>`;
            inputField.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            // Loading message show karo
            const loadingId = "loading-" + Date.now();
            chatBox.innerHTML += `<div class="message ai-msg" id="${loadingId}">Thinking...</div>`;
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch("/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: message })
                });
                const data = await response.json();
                
                let sourceHTML = data.sources && data.sources.length > 0 
                    ? `<span class="source-tag">Source: ${data.sources[0]}</span>` : "";
                
                // Markdown formatting apply karna
                const formattedAnswer = marked.parse(data.answer);
                
                document.getElementById(loadingId).outerHTML = `<div class="message ai-msg">${formattedAnswer}${sourceHTML}</div>`;
            } catch (error) {
                document.getElementById(loadingId).innerText = "Error connecting to the Oracle server.";
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
